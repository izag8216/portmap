<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" role="img" aria-label="portmap - Port and Process Viewer">
  <title>portmap</title>
  <desc>Network port grid with numbered port slots, some highlighted with connected process arrows</desc>

  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="portGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a4a6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a3a5b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="activeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a88a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="processGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a5a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main background -->
  <rect x="0" y="0" width="400" height="120" rx="8" fill="url(#bgGrad)"/>

  <!-- Port grid - 8 ports -->
  <!-- Port 22 (SSH) - active -->
  <rect x="20" y="25" width="36" height="28" rx="4" fill="url(#activeGrad)"/>
  <text x="38" y="44" font-family="monospace" font-size="11" font-weight="bold" fill="#1a1a2e" text-anchor="middle">22</text>

  <!-- Connection line to process -->
  <path d="M56,39 Q70,39 80,30" stroke="#00d4aa" stroke-width="2" fill="none"/>
  <circle cx="80" cy="28" r="4" fill="#00d4aa"/>

  <!-- Port 80 (HTTP) - active -->
  <rect x="80" y="25" width="36" height="28" rx="4" fill="url(#activeGrad)"/>
  <text x="98" y="44" font-family="monospace" font-size="11" font-weight="bold" fill="#1a1a2e" text-anchor="middle">80</text>
  <path d="M116,39 Q130,39 140,50" stroke="#00d4aa" stroke-width="2" fill="none"/>
  <circle cx="140" cy="52" r="4" fill="#00d4aa"/>

  <!-- Port 443 (HTTPS) - inactive -->
  <rect x="140" y="25" width="36" height="28" rx="4" fill="url(#portGrad)"/>
  <text x="158" y="44" font-family="monospace" font-size="11" font-weight="bold" fill="#5a6a8b" text-anchor="middle">443</text>

  <!-- Port 3000 (dev server) - active -->
  <rect x="200" y="25" width="36" height="28" rx="4" fill="url(#activeGrad)"/>
  <text x="218" y="44" font-family="monospace" font-size="11" font-weight="bold" fill="#1a1a2e" text-anchor="middle">3000</text>
  <path d="M236,39 Q250,39 260,62" stroke="#00d4aa" stroke-width="2" fill="none"/>
  <circle cx="260" cy="64" r="4" fill="#ff6b6b"/>

  <!-- Port 5432 (postgres) - inactive -->
  <rect x="260" y="25" width="36" height="28" rx="4" fill="url(#portGrad)"/>
  <text x="278" y="44" font-family="monospace" font-size="11" font-weight="bold" fill="#5a6a8b" text-anchor="middle">5432</text>

  <!-- Port 8080 (alt http) - active -->
  <rect x="320" y="25" width="36" height="28" rx="4" fill="url(#activeGrad)"/>
  <text x="338" y="44" font-family="monospace" font-size="11" font-weight="bold" fill="#1a1a2e" text-anchor="middle">8080</text>
  <path d="M356,39 Q365,39 370,25" stroke="#00d4aa" stroke-width="2" fill="none"/>
  <circle cx="370" cy="22" r="4" fill="#00d4aa"/>

  <!-- Process indicators at bottom -->
  <!-- SSH process -->
  <rect x="70" y="68" width="50" height="18" rx="9" fill="url(#processGrad)"/>
  <text x="95" y="81" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle">sshd</text>

  <!-- node process -->
  <rect x="130" y="80" width="55" height="18" rx="9" fill="url(#processGrad)"/>
  <text x="157" y="93" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle">node</text>

  <!-- python process -->
  <rect x="245" y="82" width="65" height="18" rx="9" fill="url(#processGrad)"/>
  <text x="277" y="95" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle">python</text>

  <!-- Title text using paths for cross-platform consistency -->
  <!-- "portmap" text -->
  <text x="20" y="115" font-family="monospace" font-size="10" fill="#5a6a8b" letter-spacing="2">PORTMAP</text>

  <!-- Subtitle -->
  <text x="400" y="115" font-family="monospace" font-size="9" fill="#4a5a7b" text-anchor="end">Port &amp; Process Viewer</text>

  <!-- Decorative scan lines -->
  <line x1="20" y1="58" x2="380" y2="58" stroke="#2a3a5b" stroke-width="1"/>

</svg>